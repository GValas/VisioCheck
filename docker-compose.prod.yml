# Override de production. À combiner avec le compose de base :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# (ou simplement `./start-prod.sh`).
#
# Apporte : redémarrage automatique, lecture du fichier .env, rotation des logs.

services:
  ai-service:
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  db:
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  backend:
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  frontend:
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
