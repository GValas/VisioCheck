apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: visiocheck
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: visiocheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: visiocheck-backend:latest # à pousser sur votre registre
          ports:
            - containerPort: 3000
          env:
            - name: AI_GRPC_TARGET
              value: ai-service:50051
            - name: PORT
              value: "3000"
            - name: CORS_ORIGIN
              value: https://visiocheck.example.com
          envFrom:
            - secretRef:
                name: visiocheck-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
