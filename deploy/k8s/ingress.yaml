apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: visiocheck
  namespace: visiocheck
  annotations:
    # WebSocket (Socket.IO) : affinité de session + timeouts longs.
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  rules:
    - host: visiocheck.example.com
      http:
        paths:
          # API + WebSocket → backend
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /sessions
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /stats
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          # Tout le reste → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
