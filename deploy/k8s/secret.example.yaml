# Modèle de secret. Copier en secret.yaml et renseigner de vraies valeurs
# (ou générer via `kubectl create secret`). NE PAS committer secret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: visiocheck-secrets
  namespace: visiocheck
type: Opaque
stringData:
  POSTGRES_USER: visiocheck
  POSTGRES_PASSWORD: change-me-in-prod
  POSTGRES_DB: visiocheck
  DATABASE_URL: postgres://visiocheck:change-me-in-prod@db:5432/visiocheck
  # Token API partagé (laisser vide pour désactiver l'auth — déconseillé).
  API_TOKEN: change-me
