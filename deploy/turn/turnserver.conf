# Configuration coturn pour VisioCheck (relais média WebRTC).
# Le navigateur ET le service IA (aiortc) relaient via ce TURN : ni l'un ni
# l'autre n'a besoin d'être directement joignable.

listening-port=3478
fingerprint
lt-cred-mech
realm=visiocheck

# Identifiants statiques (à surcharger en production). Pour un déploiement
# durci, préférer `use-auth-secret` + identifiants à durée limitée.
user=visiocheck:change-me

# Plage de ports relais (doit être ouverte sur le pare-feu / publiée).
min-port=49160
max-port=49200

# Derrière un NAT, indiquer l'IP publique (sinon les candidats relais sont faux) :
# external-ip=203.0.113.10

no-cli
no-tlsv1
no-tlsv1_1
